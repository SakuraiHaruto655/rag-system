<!doctype html>
<html lang="ja" data-theme="light">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="color-scheme" content="light dark" />
    <title>Local Knowledge RAG</title>
    <link rel="icon" type="image/png" href="icon.png" />
    <link rel="apple-touch-icon" href="icon.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Source+Serif+4:opsz,wght@8..60,400;8..60,500;8..60,600;8..60,700&family=Noto+Sans+JP:wght@400;500;600;700&family=Noto+Serif+JP:wght@500;600;700&family=JetBrains+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="bg-mesh" aria-hidden="true"></div>

    <div class="app">
      <aside class="sidebar" id="sidebar">
        <div class="sidebar-top">
          <div class="brand">
            <span class="brand-mark" aria-hidden="true">
              <img src="icon.png" alt="" />
            </span>
            <span class="brand-name">RAG</span>
          </div>
          <button id="closeSidebar" class="icon-button sidebar-close" type="button" aria-label="サイドバーを閉じる">
            <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <line x1="18" y1="6" x2="6" y2="18"></line>
              <line x1="6" y1="6" x2="18" y2="18"></line>
            </svg>
          </button>
        </div>

        <button id="newChatButton" class="new-chat-button" type="button">
          <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M12 5v14M5 12h14"></path>
          </svg>
          <span>新規チャット</span>
        </button>

        <nav class="sidebar-nav">
          <div class="nav-section">
            <div class="nav-label">ナレッジ</div>
            <button id="ingestButton" type="button" class="nav-item">
              <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                <polyline points="17 8 12 3 7 8"></polyline>
                <line x1="12" y1="3" x2="12" y2="15"></line>
              </svg>
              <span>ナレッジを取り込む</span>
            </button>
          </div>

          <div class="nav-section">
            <div class="nav-label">最近の質問</div>
            <ul id="historyList" class="history-list">
              <li class="history-empty">まだ質問はありません</li>
            </ul>
          </div>
        </nav>

        <div class="sidebar-bottom">
          <button id="themeToggle" class="theme-toggle" type="button" aria-label="テーマ切替">
            <span class="theme-icon theme-icon-light" aria-hidden="true">
              <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="12" cy="12" r="4"></circle>
                <path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41"></path>
              </svg>
            </span>
            <span class="theme-icon theme-icon-dark" aria-hidden="true">
              <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
              </svg>
            </span>
            <span class="theme-label">ダークモード</span>
          </button>
          <div class="env-chip">
            <div class="env-dot" aria-hidden="true"></div>
            <div class="env-meta">
              <div class="env-name">EC2 / Amazon Linux 2023</div>
              <div class="env-sub">OpenAI · Chroma</div>
            </div>
          </div>
        </div>
      </aside>

      <div class="sidebar-backdrop" id="sidebarBackdrop"></div>

      <main class="main">
        <header class="main-header">
          <button id="openSidebar" class="icon-button sidebar-open" type="button" aria-label="サイドバーを開く">
            <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <line x1="3" y1="6" x2="21" y2="6"></line>
              <line x1="3" y1="12" x2="21" y2="12"></line>
              <line x1="3" y1="18" x2="21" y2="18"></line>
            </svg>
          </button>
          <div class="header-title" id="headerTitle">新規チャット</div>
          <div class="header-spacer"></div>
          <div class="header-pill" aria-hidden="true">
            <span class="header-pill-dot"></span>
            <span>OpenAI · gpt-4o-mini</span>
          </div>
        </header>

        <div class="conversation">
          <section id="welcomeView" class="welcome">
            <div class="welcome-mark" aria-hidden="true">
              <span class="welcome-mark-inner">
                <img src="icon.png" alt="" />
              </span>
              <span class="welcome-mark-glow"></span>
            </div>
            <h1 class="welcome-title">
              <span class="welcome-title-line">何について</span>
              <span class="welcome-title-line">知りたいですか？</span>
            </h1>
            <p class="welcome-sub">登録されたナレッジから検索して、根拠付きで回答します。</p>
            <div class="suggestions">
              <button class="suggestion" type="button" data-prompt="ナレッジにはどんな内容が登録されていますか？">
                <div class="suggestion-icon">
                  <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
                </div>
                <div>
                  <div class="suggestion-title">登録内容を確認</div>
                  <div class="suggestion-body">ナレッジにはどんな内容が登録されていますか？</div>
                </div>
              </button>
              <button class="suggestion" type="button" data-prompt="全体を簡潔に要約してください。">
                <div class="suggestion-icon">
                  <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>
                </div>
                <div>
                  <div class="suggestion-title">全体を要約</div>
                  <div class="suggestion-body">全体を簡潔に要約してください。</div>
                </div>
              </button>
              <button class="suggestion" type="button" data-prompt="重要なポイントを3つ教えてください。">
                <div class="suggestion-icon">
                  <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
                </div>
                <div>
                  <div class="suggestion-title">重要ポイント</div>
                  <div class="suggestion-body">重要なポイントを3つ教えてください。</div>
                </div>
              </button>
              <button class="suggestion" type="button" data-prompt="未対応や検討中の項目はありますか？">
                <div class="suggestion-icon">
                  <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
                </div>
                <div>
                  <div class="suggestion-title">未対応事項</div>
                  <div class="suggestion-body">未対応や検討中の項目はありますか？</div>
                </div>
              </button>
            </div>
          </section>

          <section id="messages" class="messages" aria-live="polite"></section>
        </div>

        <footer class="composer-wrap">
          <form id="chatForm" class="composer">
            <textarea
              id="question"
              name="question"
              rows="1"
              placeholder="ナレッジに質問する..."
              required
              autocomplete="off"
            ></textarea>
            <div class="composer-bottom">
              <div class="composer-hint">
                <kbd>Enter</kbd> で送信 ·
                <kbd>Shift</kbd>+<kbd>Enter</kbd> で改行
              </div>
              <button type="submit" class="send-button" aria-label="送信" disabled>
                <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                  <line x1="12" y1="19" x2="12" y2="5"></line>
                  <polyline points="5 12 12 5 19 12"></polyline>
                </svg>
              </button>
            </div>
          </form>
          <p class="footnote">回答は検索結果に基づくため、根拠が不足する場合はその旨を返します。</p>
        </footer>
      </main>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/marked@12.0.0/marked.min.js"></script>
    <script src="app.js"></script>
  </body>
</html>
